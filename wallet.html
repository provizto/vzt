<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeFi Platform - Connect Wallet</title>
    <style>
        /* --- CSS STYLING --- */
        :root {
            --bg-color: #0b0e14;
            --card-bg: #151a26;
            --primary-color: #3861fb;
            --primary-hover: #2b4ecf;
            --text-color: #ffffff;
            --text-muted: #8f96a3;
            --success-color: #00c853;
            --border-radius: 12px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .defi-container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: var(--border-radius);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #222b3d;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(45deg, #3861fb, #9838fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        /* Tombol Connect Wallet */
        .btn-connect {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: var(--border-radius);
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(56, 97, 251, 0.3);
        }

        .btn-connect:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-connect:active {
            transform: translateY(1px);
        }

        /* Info Wallet setelah Terhubung */
        .wallet-info {
            display: none; /* Tersembunyi di awal */
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: #1c2333;
            border-radius: var(--border-radius);
            text-align: left;
            border: 1px solid #2a354d;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .label {
            color: var(--text-muted);
        }

        .value {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }

        .status-connected {
            color: var(--success-color);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="defi-container">
        <div class="logo">vVZT DeFi</div>
        <div class="subtitle">Swap, Vaults, & veGovernance Portal</div>
        
        <button id="connect-btn" class="btn-connect">Connect Wallet</button>

        <div id="wallet-info" class="wallet-info">
            <div class="info-row">
                <span class="label">Status:</span>
                <span class="status-connected">Connected</span>
            </div>
            <div class="info-row">
                <span class="label">Address:</span>
                <span id="wallet-address" class="value">0x00...000</span>
            </div>
            <div class="info-row">
                <span class="label">Chain ID:</span>
                <span id="chain-id" class="value">-</span>
            </div>
        </div>
    </div>

    <script type="module">
        // 1. Import library resmi dari WalletConnect CDN
        import { createWeb3Modal, defaultWagmiConfig } from 'https://esm.sh/@web3modal/wagmi@3.5.0';
        import { reconnect, watchAccount, disconnect } from 'https://esm.sh/@wagmi/core@2.0.0';
        import { mainnet, polygon, bsc } from 'https://esm.sh/@wagmi/core/chains';

        // 2. Konfigurasi Project ID Anda
        // DAPATKAN DISINI: https://cloud.walletconnect.com/
        const projectId = 'PASTE_YOUR_PROJECT_ID_HERE'; 

        if (projectId === 'PASTE_YOUR_PROJECT_ID_HERE') {
            alert('Perhatian: Harap masukkan WalletConnect Project ID Anda di dalam kode script agar tombol berfungsi.');
        }

        // 3. Tentukan Blockchain yang didukung oleh DeFi Anda
        const chains = [mainnet, polygon, bsc];
        
        // Metadata Aplikasi yang akan muncul di layar HP user saat scan
        const metadata = {
            name: 'vVZT DeFi Platform',
            description: 'DEX, Vaults, Governance and Affiliate Protocol',
            url: window.location.origin,
            icons: ['https://avatars.githubusercontent.com/u/37784886']
        };

        const wagmiConfig = defaultWagmiConfig({ chains, projectId, metadata });

        // 4. Inisialisasi Modal Utama
        const modal = createWeb3Modal({
            wagmiConfig,
            projectId,
            chains,
            themeMode: 'dark', // Menyesuaikan tema DeFi (dark/light)
            themeVariables: {
                '--w3m-accent': '#3861fb', // Warna utama menyamakan CSS kita
                '--w3m-border-radius-master': '12px'
            }
        });

        // 5. Logika Interaksi DOM / UI
        const connectBtn = document.getElementById('connect-btn');
        const walletInfoDiv = document.getElementById('wallet-info');
        const walletAddressSpan = document.getElementById('wallet-address');
        const chainIdSpan = document.getElementById('chain-id');

        // Fungsi untuk mempersingkat alamat wallet (Contoh: 0x1234...abcd)
        function truncateAddress(address) {
            if (!address) return '';
            return `${address.substring(0, 6)}...${address.substring(address.length - 4)}`;
        }

        // Menghubungkan fungsi klik tombol ke Modal Web3
        connectBtn.addEventListener('click', () => {
            // Jika user sudah terkoneksi, klik tombol akan membuka menu profile/disconnect
            // Jika belum, akan membuka daftar pilihan wallet (MetaMask, TrustWallet, dll)
            modal.open();
        });

        // 6. Watcher: Memantau perubahan status wallet secara Real-Time
        watchAccount(wagmiConfig, {
            onChange(account) {
                if (account.isConnected) {
                    // Update UI saat terkoneksi
                    connectBtn.innerText = 'Manage Wallet';
                    walletAddressSpan.innerText = truncateAddress(account.address);
                    chainIdSpan.innerText = account.chainId;
                    walletInfoDiv.style.display = 'block';
                    
                    console.log("Wallet Terhubung:", account.address);
                    // Di sini Anda bisa menembakkan API Affiliasi atau mengambil data saldo Vaults
                } else {
                    // Reset UI jika disconnect
                    connectBtn.innerText = 'Connect Wallet';
                    walletInfoDiv.style.display = 'none';
                    console.log("Wallet Terputus");
                }
            }
        });
    </script>
</body>
</html>
