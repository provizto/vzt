<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provizto | Unified DeFi Hub</title>
    <style>
        :root { --bg: #0a0a0a; --primary: #14f195; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; }
        nav { display: flex; justify-content: space-between; padding: 2rem 10%; align-items: center; }
        .logo { color: var(--primary); font-weight: bold; font-size: 1.5rem; }
        .view { padding: 50px 10%; }
        button { background: var(--primary); color: black; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        #dapp-view { display: none; } /* Default sembunyikan dApp */
        .card { background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #333; }
    </style>
</head>
<body>

    <!-- Navigasi Utama -->
    <nav>
        <div class="logo">PROVIZTO</div>
        <div>
            <button onclick="showView('landing')">Home</button>
            <button onclick="showView('dapp')">Launch dApp</button>
        </div>
    </nav>

    <!-- 1. LANDING VIEW -->
    <section id="landing-view" class="view">
        <h1>Unified DeFi Hub on Solana</h1>
        <p>Swap, Optimize, and Grow. All in one atomic-transaction workflow.</p>
        <button onclick="showView('dapp')">Get Started</button>
    </section>

    <!-- 2. DAPP VIEW -->
    <section id="dapp-view" class="view">
        <div class="card">
            <h2>Provizto dApp Hub</h2>
            <div id="wallet-area">
                <button id="btn-connect" onclick="connectWallet()">Connect Wallet</button>
                <span id="wallet-address" style="display:none; color: var(--primary);"></span>
            </div>
            <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
            <h3>DEX Swap</h3>
            <button onclick="alert('Simulated Swap: 1 SOL -> 150 VZT')">Execute Swap</button>
        </div>
    </section>

    <script>
        // Fungsi pindah tampilan
        function showView(view) {
            document.getElementById('landing-view').style.display = view === 'landing' ? 'block' : 'none';
            document.getElementById('dapp-view').style.display = view === 'dapp' ? 'block' : 'none';
        }

        // Fungsi Simulasi Wallet
        function connectWallet() {
            const btn = document.getElementById('btn-connect');
            const addr = document.getElementById('wallet-address');
            btn.style.display = 'none';
            addr.style.display = 'inline';
            addr.innerText = "Wallet: 7xTg...9pL1"; // Simulasi alamat
        }
    </script>
</body>
</html>
