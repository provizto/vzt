name: Provizto Smart Contract Cloud Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  solana-anchor-build:
    name: Compile Rust Contract on Cloud VM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Menggunakan compiler Rust bawaan untuk memeriksa kesalahan sintaksis secara instan
      - name: Install Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install Linux System Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y pkg-config build-essential libssl-dev

      # Melakukan pengecekan kode (Cargo Check) tanpa perlu alat Solana CLI
      - name: Run Syntax Check
        run: cargo check --manifest-path programs/vzt/Cargo.toml