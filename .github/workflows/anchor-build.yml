name: Provizto Smart Contract Cloud Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  solana-anchor-build:
    name: Compile Rust Contract on Cloud VM
    runs-on: ubuntu-latest

    steps:
      # 1. Ambil kode dari GitHub
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Pasang Rust
      - name: Install Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      # 3. PROSES UTAMA TERPADU (Satu Shell untuk Menghindari Hilang Path)
      - name: Install Tools, Setup Keypair, and Execute Build
        run: |
          # A. Pasang dependensi Linux dasar
          sudo apt-get update && sudo apt-get install -y pkg-config build-essential libssl-dev

          # B. Pasang Solana CLI secara instan
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.17/install)"
          
          # C. Pasang AVM dan Anchor CLI
          cargo install --git https://github.com/coral-xyz/anchor --tag v0.30.0 avm --locked
          $HOME/.cargo/bin/avm install 0.30.0
          $HOME/.cargo/bin/avm use 0.30.0

          # D. Daftarkan semua jalur biner ke sesi shell aktif saat ini
          export PATH="$HOME/.local/share/solana/install/active_release/bin:$HOME/.avm/bin:$HOME/.cargo/bin:$PATH"

          # E. Verifikasi pemasangan (untuk memastikan alat terbaca)
          solana --version
          anchor --version

          # F. Buat Dummy Wallet Keypair
          mkdir -p ~/.config/solana
          solana-keygen new --no-bip39-passphrase --outfile ~/.config/solana/id.json

          # G. Eksekusi Kompilasi Utama Program Rust Provizto
          anchor build

      # 4. Amankan Hasil Biner (.so dan JSON IDL) agar Bisa Anda Unduh
      - name: Upload Compiled Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: provizto-compiled-binaries
          path: |
            target/deploy/vzt.so
            target/idl/vzt.json