name: Provizto Smart Contract Cloud Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  solana-anchor-build:
    name: Compile Rust Contract on Cloud VM
    runs-on: ubuntu-latest

    steps:
      # 1. Mengunduh kode dari repositori Anda
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Memasang biner Solana & Anchor secara manual
      - name: Install Solana, Rust, and Anchor
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libudev-dev libssl-dev zlib1g-dev llvm clang make
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup default stable
          cargo install --locked anchor-cli --version 0.30.0
          curl -sSfL https://release.solana.com/v1.18.17/install | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      # 3. Menghasilkan Keypair Otoritas dummy
      - name: Generate Dummy Solana Wallet Keypair
        run: |
          mkdir -p ~/.config/solana
          solana-keygen new --no-bip39-passphrase --outfile ~/.config/solana/id.json

      # 4. Kompilasi Utama Program Rust
      - name: Execute Anchor Build
        run: anchor build --skip-lint

      # 5. Mengunggah Hasil Kompilasi (.so dan JSON IDL)
      - name: Upload Compiled Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: provizto-compiled-binaries
          path: |
            target/deploy/vzt.so
            target/idl/vzt.json