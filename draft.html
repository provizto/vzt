<!DOCTYPE html>

<head>

    <title>Provizto dApp Hub - Secure Edition</title>
    <style>
        /* [CSS SEBELUMNYA TETAP SAMA, TAMBAHKAN STYLE INI DI BAWAHNYA] */
        .kol-metrics-card {
            background-color: #1a1625;
            border: 1px solid #9945FF;
            padding: 20px;
            border-radius: 12px;
            margin-top: 25px;
            display: none; /* Disembunyikan secara default */
        }
        .kol-metrics-card h3 { color: #9945FF; margin-bottom: 15px; }
        .alert-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #f87171;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <main class="dapp-container">
        <section id="kolMetricsSection" class="kol-metrics-card">

            </div>
            <div id="bot-alert" class="alert-box">
                <strong>Security Alert:</strong> Unusual referral activity detected. Bonus accumulation suspended pending algorithmic review.
            </div>
        </section>
    </main>
