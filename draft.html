<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Provizto dApp Hub - Secure Edition</title>

<style>
/* CSS kamu tetap */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,sans-serif;}
body{background:#0b0f19;color:#f8fafc;}
.dapp-header{display:flex;justify-content:space-between;align-items:center;padding:20px 40px;background:#111827;border-bottom:1px solid #1f2937;}
.logo{font-size:1.4rem;font-weight:800;color:#fff;}
.vzt-badge{font-size:.8rem;background:#14b8a6;padding:3px 8px;border-radius:12px;}
.btn-connect{background:linear-gradient(135deg,#8b5cf6,#3b82f6);color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;}
.dapp-container{max-width:1200px;margin:auto;padding:40px 20px;}
.wallet-status{text-align:center;color:#94a3b8;margin-bottom:20px;}
.security-banner{padding:15px;border-radius:8px;margin-bottom:25px;font-weight:600;text-align:center;}
.products-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:25px;}
.product-card{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:25px;}
.product-card:hover{transform:translateY(-4px);border-color:#3b82f6;}
.stat-box{background:#1f2937;padding:8px;border-radius:6px;color:#3b82f6;margin-bottom:20px;text-align:center;}
.btn-action{background:#1f2937;color:#94a3b8;border:1px solid #374151;padding:12px;border-radius:8px;cursor:not-allowed;width:100%;}
.btn-action:not([disabled]){background:#3b82f6;color:#fff;cursor:pointer;}
footer{text-align:center;padding:20px;color:#64748b;border-top:1px solid #1f2937;margin-top:40px;}
</style>
</head>

<body>

<header class="dapp-header">
<div class="logo">PROVIZTO <span class="vzt-badge">$VZT</span></div>

<div>
<button class="btn-connect" onclick="switchLang()">EN / ID</button>
<button class="btn-connect" id="walletBtn" onclick="toggleWallet()">Connect Wallet</button>
</div>
</header>

<main class="dapp-container">

<div class="wallet-status" id="walletStatus">Wallet Status: Disconnected (Network: Solana)</div>

<div class="security-banner" id="securityBanner" style="display:none;"></div>

<section class="products-grid">
<div class="product-card">
<h3 id="swapTitle">AMM DEX Swap</h3>
<p class="desc" id="swapDesc">Tukar aset instan dengan perlindungan MEV.</p>
<div class="stat-box">Trading Fee: 0.3%</div>
<button class="btn-action" onclick="executeSecureTx('Swap')" disabled id="swapBtn">Launch Swap</button>
</div>

<div class="product-card">
<h3 id="yieldTitle">Yield Optimizer</h3>
<p class="desc" id="yieldDesc">Auto compound system berjalan otomatis.</p>
<div class="stat-box">Boosted APY: 49%</div>
<button class="btn-action" onclick="executeSecureTx('Vault')" disabled id="yieldBtn">Open Vault</button>
</div>
</section>

<!-- BACK HOME -->
<div style="text-align:center;margin-top:40px;">
<button class="btn-connect" onclick="goHome()">⬅ Back to Home</button>
</div>

</main>

<footer id="footerText">
© 2026 Provizto dApp Hub. All Rights Reserved.
</footer>

<script>
let isConnected=false;
let currentLang="EN";
let myWalletAddress="7xVZT...SolanaWallet";
let lastTransactionTime=0;

function toggleWallet(){
const btn=document.getElementById('walletBtn');
const status=document.getElementById('walletStatus');
const actionButtons=document.querySelectorAll('.btn-action');

if(!isConnected){
btn.innerText=myWalletAddress;
btn.style.background="#22c55e";

status.innerText=currentLang==="EN"
?"Wallet Connected to Solana Mainnet"
:"Wallet Terhubung ke Solana Mainnet";

status.style.color="#22c55e";

actionButtons.forEach(b=>b.removeAttribute('disabled'));

// 🔥 POPUP TEST
alert(currentLang==="EN"
?"Wallet Connected Successfully! (Test Popup)"
:"Wallet Berhasil Terhubung! (Popup Uji Coba)");

isConnected=true;

}else{
btn.innerText=currentLang==="EN"?"Connect Wallet":"Hubungkan Wallet";
btn.style.background="linear-gradient(135deg,#8b5cf6,#3b82f6)";

status.innerText=currentLang==="EN"
?"Wallet Disconnected"
:"Wallet Terputus";

status.style.color="#94a3b8";

actionButtons.forEach(b=>b.setAttribute('disabled','true'));

isConnected=false;
}
}

function switchLang(){
currentLang=currentLang==="EN"?"ID":"EN";

document.getElementById("swapDesc").innerText=
currentLang==="EN"
?"Instant asset swap with MEV protection."
:"Tukar aset instan dengan perlindungan MEV.";

document.getElementById("yieldDesc").innerText=
currentLang==="EN"
?"Auto compound system running periodically."
:"Sistem auto compound berjalan otomatis.";

document.getElementById("swapBtn").innerText=
currentLang==="EN"?"Launch Swap":"Mulai Swap";

document.getElementById("yieldBtn").innerText=
currentLang==="EN"?"Open Vault":"Buka Vault";

document.getElementById("walletBtn").innerText=
isConnected?myWalletAddress:
(currentLang==="EN"?"Connect Wallet":"Hubungkan Wallet");

document.getElementById("footerText").innerText=
currentLang==="EN"
?"© 2026 Provizto dApp Hub. All Rights Reserved."
:"© 2026 Provizto dApp Hub. Hak Cipta Dilindungi.";
}

function goHome(){
alert(currentLang==="EN"
?"Redirecting to Home..."
:"Kembali ke Beranda...");
window.location.href="/";
}

function executeSecureTx(actionName){
const now=Math.floor(Date.now()/1000);
if(now-lastTransactionTime<10){
showBanner(currentLang==="EN"
?"Too many transactions! Wait 10 seconds."
:"Terlalu cepat! Tunggu 10 detik.","error");
return;
}
lastTransactionTime=now;

showBanner(
(currentLang==="EN"
?`Transaction ${actionName} successful`
:`Transaksi ${actionName} berhasil`),
"success"
);
}

function showBanner(text,type){
const banner=document.getElementById('securityBanner');
banner.innerText=text;
banner.style.display="block";

if(type==="error"){banner.style.background="#ef4444";}
else{banner.style.background="#22c55e";}
}
</script>

</body>
</html>
